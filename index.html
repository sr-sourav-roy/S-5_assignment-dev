<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>dev-web</title>
    <!-- Use daisyUI from CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- icon set by font_kite -->
    <script
      src="https://kit.fontawesome.com/443d697212.js"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="max-w-full bg-sky-100">
    <!-- header section -->
    <header class="max-w-screen-xl mx-auto mb-10 pt-3 pb-3">
      <!-- nave container -->
      <div
        class="flex justify-between items-center shadow-sm rounded-md bg-white"
      >
        <!-- left side -->
        <div class="flex justify-center items-center gap-2">
          <img class="w-1/3 p-4" src="./assets/logo.png" alt="" />
          <h1 class="text-3xl font-light">
            Dev<span class="font-bold">Board</span>
          </h1>
        </div>
        <!-- right side -->
        <div class="flex justify-center items-center gap-2">
          <img src="./assets/checkbox.png" alt="" />
          <p class="text-3xl font-semibold">25</p>
          <button class="mx-5">
            <img src="./assets/theme-btn.png" alt="" />
          </button>
        </div>
      </div>
    </header>
    <!-- main section -->
    <main>
      <!--main_container -->
      <div>
        <!-- one container -->
        <div></div>
        <!-- two container -->
        <div></div>
      </div>
    </main>
    <footer></footer>
  </body>
</html>
